<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harikumar Muthu — Neural Interfaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0b; --surface: rgba(255,255,255,0.04); --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.1); --border-focus: rgba(120,180,255,0.45);
  --text-1: #f0f0f0; --text-2: #a0a0a8; --text-3: #606068;
  --accent: #7ab4ff; --danger: #ff6b6b; --danger-bg: rgba(255,107,107,0.15);
  --white: #fff; --black: #0a0a0b;
  --r-sm: 0.5rem; --r-md: 1rem; --r-lg: 1.5rem; --r-xl: 2rem;
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text-1); line-height: 1.65; -webkit-font-smoothing: antialiased; }
h1, h2, h3 { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }
a { color: inherit; text-decoration: none; }

.toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: rgba(10,10,11,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
.tb-left { display: flex; align-items: center; gap: 0.75rem; }
.tb-left span { font-size: 0.85rem; color: var(--text-2); }
.save-msg { font-size: 0.7rem; color: #5ce882; opacity: 0; transition: opacity 0.3s; }
.save-msg.show { opacity: 1; }
.tb-right { display: flex; align-items: center; gap: 0.5rem; }
.btn-rst { padding: 0.4rem 0.75rem; font-size: 0.72rem; border-radius: var(--r-sm); border: 1px solid rgba(255,107,107,0.3); background: transparent; color: var(--danger); cursor: pointer; font-family: inherit; }
.btn-rst:hover { background: var(--danger-bg); }
.btn-ed { padding: 0.4rem 1rem; font-size: 0.82rem; border-radius: var(--r-sm); border: none; cursor: pointer; font-family: inherit; font-weight: 500; transition: background 0.2s; }
.btn-ed.off { background: rgba(255,255,255,0.1); color: var(--white); }
.btn-ed.on { background: #3dbe64; color: var(--white); }

.main { max-width: 72rem; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
@media(min-width:768px) { .main { padding: 4rem 2.5rem 6rem; } }

.hero { display: grid; gap: 2.5rem; }
@media(min-width:768px) { .hero { grid-template-columns: 1.15fr 0.85fr; align-items: start; } }
.hero-text { display: flex; flex-direction: column; gap: 1.75rem; }
.pill { display: inline-flex; align-items: center; border: 1px solid rgba(255,255,255,0.15); border-radius: 999px; background: rgba(255,255,255,0.05); padding: 0.25rem 0.85rem; font-size: 0.85rem; color: var(--text-2); width: fit-content; }
.h1 { font-size: clamp(2.2rem,5vw,3.8rem); line-height: 1.1; letter-spacing: -0.02em; }
.sub { font-size: 1.15rem; line-height: 1.7; color: var(--text-2); max-width: 40rem; margin-top: 1rem; }
.bio { display: flex; flex-direction: column; gap: 1rem; max-width: 40rem; }
.bio p { font-size: 0.95rem; line-height: 1.75; color: var(--text-3); }
.acts { display: flex; flex-wrap: wrap; gap: 0.75rem; padding-top: 0.5rem; }
.btn-p { display: inline-flex; padding: 0.75rem 1.35rem; border-radius: var(--r-lg); background: var(--white); color: var(--black); font-size: 0.85rem; font-weight: 500; font-family: inherit; border: none; cursor: pointer; transition: transform 0.15s; text-decoration: none; }
.btn-p:hover { transform: translateY(-2px); }
.btn-g { display: inline-flex; padding: 0.75rem 1.35rem; border-radius: var(--r-lg); border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: var(--white); font-size: 0.85rem; font-weight: 500; font-family: inherit; cursor: pointer; transition: background 0.2s; text-decoration: none; }
.btn-g:hover { background: rgba(255,255,255,0.1); }

/* Hero image pair — side by side below buttons */
.hero-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
@media(max-width:500px) { .hero-imgs { grid-template-columns: 1fr; } }
.hero-img-slot { position: relative; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); aspect-ratio: 4/3; background: linear-gradient(135deg,#141416,#0c0c0e); }
.hero-img-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-img-slot .img-ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.3rem; background: rgba(0,0,0,0.55); opacity: 0; transition: opacity 0.25s; cursor: pointer; }
.hero-img-slot:hover .img-ov { opacity: 1; }
.hero-img-ph { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 0.4rem; cursor: pointer; }

.sidebar { border-radius: var(--r-xl); border: 1px solid var(--border); background: var(--surface); overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
.portrait { position: relative; border-bottom: 1px solid var(--border); background: linear-gradient(135deg,#1a1a1e,#0d0d10 50%,#000); overflow: hidden; }
.portrait-stack { display: flex; flex-direction: column; }
.portrait-stack .img-wrap { position: relative; overflow: hidden; }
.portrait-stack .img-wrap img { width: 100%; display: block; object-fit: cover; }
.portrait-stack .img-top { height: 260px; }
.portrait-stack .img-bot { height: 220px; }
.portrait-stack .img-ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.3rem; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.25s; cursor: pointer; }
.portrait-stack .img-wrap:hover .img-ov { opacity: 1; }

.sb-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
.lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-3); font-family: 'DM Sans', sans-serif; }
.sb-txt { margin-top: 0.5rem; font-size: 0.9rem; line-height: 1.65; color: var(--text-2); }
.sb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media(max-width:500px) { .sb-grid { grid-template-columns: 1fr; } }
.sb-cell { border-radius: var(--r-md); background: rgba(255,255,255,0.04); padding: 1rem; }
.sb-cell p:last-child { margin-top: 0.5rem; font-size: 0.82rem; line-height: 1.55; color: var(--text-2); }
.sb-links { border-radius: var(--r-md); border: 1px solid var(--border); padding: 1rem; }
.ct-box { border-radius: var(--r-md); background: var(--white); padding: 1rem; color: var(--black); }
.ct-box a { text-decoration: underline; text-underline-offset: 4px; font-size: 0.95rem; display: block; margin-top: 0.5rem; }

.sec { margin-top: 5rem; }
.sec-lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-3); font-family: 'DM Sans', sans-serif; }
.sec-t { margin-top: 0.75rem; font-size: clamp(1.5rem,3vw,2rem); line-height: 1.2; }

.feat { margin-top: 3rem; border-radius: var(--r-xl); border: 1px solid var(--border); background: var(--surface); padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
@media(min-width:768px) { .feat { padding: 2rem; } }
.feat-in { display: grid; gap: 1.5rem; }
@media(min-width:768px) { .feat-in { grid-template-columns: 1fr auto; align-items: start; } }
.feat-sum { margin-top: 1rem; font-size: 0.95rem; line-height: 1.75; color: var(--text-2); max-width: 48rem; }
.tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
.tag { border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); padding: 0.2rem 0.75rem; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-2); position: relative; font-family: 'DM Sans', sans-serif; }
.tag .rm-tag { position: absolute; top: -4px; right: -4px; width: 14px; height: 14px; border-radius: 50%; background: var(--danger); color: white; font-size: 8px; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; }
.editing .tag:hover .rm-tag { display: flex; }
.tag-in { width: 5rem; border-radius: 999px; border: 1px dashed rgba(255,255,255,0.2); background: transparent; padding: 0.2rem 0.75rem; font-size: 0.68rem; color: var(--text-2); outline: none; font-family: 'DM Sans', sans-serif; }
.tag-in:focus { border-color: var(--border-focus); }

.abt-grid { display: grid; gap: 2rem; margin-top: 2rem; }
@media(min-width:768px) { .abt-grid { grid-template-columns: 1fr 2fr; } }
.abt-body { display: flex; flex-direction: column; gap: 1.25rem; }
.abt-body p { font-size: 0.95rem; line-height: 1.75; color: var(--text-3); }

.proj-hdr { display: flex; align-items: flex-end; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; }
.proj-grid { display: grid; gap: 1.25rem; margin-top: 2rem; }
@media(min-width:768px) { .proj-grid { grid-template-columns: 1fr 1fr; } }
.proj { position: relative; border-radius: var(--r-xl); border: 1px solid var(--border); background: var(--surface); padding: 1.5rem; transition: background 0.25s, transform 0.2s; }
.proj:hover { background: var(--surface-hover); transform: translateY(-2px); }
.proj h3 { font-size: 1.25rem; line-height: 1.3; }
.proj .desc { margin-top: 0.75rem; font-size: 0.85rem; line-height: 1.7; color: var(--text-2); }
.proj .rm-proj { position: absolute; top: 1rem; right: 1rem; width: 1.75rem; height: 1.75rem; border-radius: 50%; background: var(--danger-bg); color: var(--danger); border: none; cursor: pointer; font-size: 0.75rem; display: none; align-items: center; justify-content: center; }
.editing .proj:hover .rm-proj { display: flex; }
.btn-ap { padding: 0.5rem 1rem; border-radius: var(--r-md); background: rgba(122,180,255,0.15); color: var(--accent); border: none; font-size: 0.82rem; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-ap:hover { background: rgba(122,180,255,0.25); }

.bot-grid { display: grid; gap: 1.5rem; }
@media(min-width:768px) { .bot-grid { grid-template-columns: 1fr 1fr; } }
.bot-card { border-radius: var(--r-xl); border: 1px solid var(--border); background: var(--surface); padding: 1.5rem; }
.bot-card h2 { font-size: 1.5rem; margin-top: 0.75rem; }

.closing { margin-top: 5rem; border-radius: var(--r-xl); border: 1px solid var(--border); background: linear-gradient(135deg,#111114,#000 50%,#0a0a0e); padding: 2.5rem 1.5rem; }
@media(min-width:768px) { .closing { padding: 3rem 2.5rem; } }
.closing-in { display: grid; gap: 2rem; }
@media(min-width:768px) { .closing-in { grid-template-columns: 1fr auto; align-items: center; } }
.closing-q { font-size: clamp(1.3rem,2.5vw,1.7rem); line-height: 1.35; }
.footer { border-top: 1px solid rgba(255,255,255,0.04); padding: 2rem 0; text-align: center; font-size: 0.7rem; color: var(--text-3); }

.lnks { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
.lnk { position: relative; display: inline-flex; align-items: center; border-radius: var(--r-md); border: 1px solid var(--border); padding: 0.4rem 0.85rem; font-size: 0.82rem; color: var(--text-2); transition: background 0.2s; }
.lnk:hover { background: rgba(255,255,255,0.08); }
.lnk .rm-lnk { position: absolute; top: -5px; right: -5px; width: 16px; height: 16px; border-radius: 50%; background: var(--danger); color: white; font-size: 9px; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; }
.editing .lnk:hover .rm-lnk { display: flex; }
.btn-al { border-radius: var(--r-md); border: 1px dashed rgba(255,255,255,0.2); padding: 0.4rem 0.85rem; font-size: 0.82rem; color: var(--text-3); background: transparent; cursor: pointer; font-family: inherit; }
.btn-al:hover { border-color: var(--border-focus); color: var(--accent); }
.lf { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; width: 100%; border-radius: var(--r-md); border: 1px solid rgba(122,180,255,0.25); background: rgba(255,255,255,0.03); padding: 0.75rem; margin-top: 0.5rem; }
.lf input { flex: 1; min-width: 100px; border-radius: var(--r-sm); border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); padding: 0.4rem 0.7rem; font-size: 0.82rem; color: var(--text-1); outline: none; font-family: inherit; }
.lf input:focus { border-color: var(--border-focus); }
.lf .ok { padding: 0.4rem 0.75rem; border-radius: var(--r-sm); background: rgba(122,180,255,0.6); color: white; border: none; font-size: 0.8rem; font-weight: 500; cursor: pointer; font-family: inherit; }
.lf .ccl { padding: 0.4rem 0.5rem; background: transparent; border: none; color: var(--text-3); cursor: pointer; font-size: 0.8rem; font-family: inherit; }
.no-lnk { font-size: 0.82rem; font-style: italic; color: var(--text-3); }

.ei, .et { width: 100%; border-radius: var(--r-sm); border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); padding: 0.5rem 0.7rem; color: var(--text-1); outline: none; font-family: inherit; font-size: inherit; line-height: inherit; }
.ei:focus, .et:focus { border-color: var(--border-focus); }
.et { resize: vertical; min-height: 4rem; }
.ph { font-style: italic; opacity: 0.35; }
.ci { width: 100%; border-radius: var(--r-sm); border: 1px solid #d0d0d0; background: #f5f5f5; padding: 0.4rem 0.6rem; color: #111; font-family: inherit; font-size: 0.9rem; outline: none; margin-top: 0.5rem; }
.bp { position: relative; }
.bp .rp { position: absolute; left: -1.5rem; top: 0.25rem; color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.7rem; opacity: 0; transition: opacity 0.2s; }
.editing .bp:hover .rp { opacity: 1; }
.btn-addp { background: none; border: none; color: var(--accent); opacity: 0.6; font-size: 0.82rem; cursor: pointer; font-family: inherit; }
.btn-addp:hover { opacity: 1; }
.hidden { display: none !important; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.fu { animation: fadeUp 0.6s ease-out both; }
.fu1 { animation-delay: 0.05s; } .fu2 { animation-delay: 0.12s; } .fu3 { animation-delay: 0.2s; } .fu4 { animation-delay: 0.28s; } .fu5 { animation-delay: 0.35s; }
</style>
</head>
<body>
<div class="toolbar">
  <div class="tb-left"><span>harikumar.site</span><span class="save-msg" id="saveBadge">✓ Saved</span></div>
  <div class="tb-right">
    <button class="btn-rst hidden" id="btnReset" onclick="resetAll()">Reset to defaults</button>
    <button class="btn-ed off" id="btnEdit" onclick="toggleEdit()">✏️ Edit site</button>
  </div>
</div>
<main class="main" id="root"></main>
<footer class="footer" id="ft"></footer>
<!-- 4 file inputs for 4 image slots -->
<input type="file" id="fileTop" accept="image/*" style="display:none">
<input type="file" id="fileBot" accept="image/*" style="display:none">
<input type="file" id="fileL1" accept="image/*" style="display:none">
<input type="file" id="fileL2" accept="image/*" style="display:none">

    { id:"p2", title:"Acoustically modulated electromagnetic neural recording", description:"A theoretical framework for tagging neural electromagnetic fields with focused ultrasound for localized readout.", links:[] },
    { id:"p3", title:"MINION (Minimally invasive optofluidic neural interface)", description:"A minimally invasive optofluidic neural interface concept designed to expand optical access through a small cranial opening.", links:[] },
    { id:"p4", title:"Optical microendoscopy", description:"Structured-illumination and multicore-fiber neural imaging for freely moving animal studies.", links:[] }
  ],
  profileLinks: [ { label:"Google Scholar", url:"" }, { label:"LinkedIn", url:"" } ],
  cvText: "Useful links and documents.",
  cvLinks: [],
  imgTop: "", imgBot: "", imgL1: "", imgL2: ""
};

let D, editing=false, _st;

function load() {
  try { const s=localStorage.getItem("hk-site-v3"); D=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULTS)); }
  catch { D=JSON.parse(JSON.stringify(DEFAULTS)); }
  ["projects","featured","profileLinks","cvLinks"].forEach(k => { if(!D[k]) D[k]=DEFAULTS[k]; });
  D.projects.forEach(p => { if(!p.links) p.links=[]; });
  if(!D.featured.links) D.featured.links=[];
  ["imgTop","imgBot","imgL1","imgL2"].forEach(k => { if(D[k]===undefined) D[k]=""; });
}

function save() {
  clearTimeout(_st);
  _st = setTimeout(() => {
    try {
      localStorage.setItem("hk-site-v3", JSON.stringify(D));
      const b=document.getElementById("saveBadge"); b.classList.add("show"); setTimeout(()=>b.classList.remove("show"),1800);
    } catch(e) { console.error(e); }
  }, 500);
}

function uid() { return Math.random().toString(36).slice(2,9); }
function esc(s) { const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

function ef(val, key, opts={}) {
  const { ml, ph="Type here\u2026", cls="" } = opts;
  if(!editing) { return val ? `<span class="${cls}">${esc(val)}</span>` : `<span class="ph ${cls}">${esc(ph)}</span>`; }
  if(ml) return `<textarea class="et ${cls}" data-key="${key}" placeholder="${esc(ph)}" rows="3">${esc(val)}</textarea>`;
  return `<input class="ei ${cls}" data-key="${key}" value="${esc(val)}" placeholder="${esc(ph)}">`;
}

function lnksH(links, path) {
  let h='<div class="lnks">';
  links.forEach((l,i) => {
    h+=`<span><a href="${esc(l.url)}" target="_blank" rel="noopener" class="lnk">${esc(l.label)} \u2197<button class="rm-lnk" onclick="event.preventDefault();event.stopPropagation();rmLnk('${path}',${i})">\u2715</button></a></span>`;
  });
  if(editing) h+=`<button class="btn-al" onclick="showLF(this,'${path}')">+ Add link</button>`;
  else if(!links.length) h+=`<span class="no-lnk">No links yet</span>`;
  h+='</div>'; return h;
}

function tagsH(tags) {
  let h='<div class="tags">';
  tags.forEach((t,i) => { h+=`<span class="tag">${esc(t)}<button class="rm-tag" onclick="rmTag(${i})">\u2715</button></span>`; });
  if(editing) h+=`<input class="tag-in" placeholder="+ tag" onkeydown="addTag(event,this)">`;
  h+='</div>'; return h;
}

// Render a hero image slot (side-by-side pair in left column)
function heroImgSlot(imgKey, fileId, label) {
  const src = D[imgKey];
  const E = editing;
  let h = `<div class="hero-img-slot">`;
  if(src) {
    h += `<img src="${src}" alt="${esc(label)}">`;
    if(E) h += `<div class="img-ov" onclick="document.getElementById('${fileId}').click()">
      <span style="font-size:0.8rem;font-weight:500">Replace</span>
      <button onclick="event.stopPropagation();rmImg('${imgKey}')" style="background:none;border:none;color:#ff9999;cursor:pointer;font-size:0.7rem;text-decoration:underline">Remove</button>
    </div>`;
  } else {
    if(E) {
      h += `<div class="hero-img-ph" onclick="document.getElementById('${fileId}').click()">
        <span style="font-size:1.5rem">\ud83d\udcf7</span>
        <span style="font-size:0.78rem;color:var(--text-2)">Add image</span>
        <span style="font-size:0.65rem;color:var(--text-3)">JPG, PNG \u2014 under 4 MB</span>
      </div>`;
    } else {
      h += `<div class="hero-img-ph"><span style="font-size:0.72rem;color:var(--text-3)">Image slot</span></div>`;
    }
  }
  h += `</div>`;
  return h;
}

function render() {
  const E=editing, cls=E?"editing":"";
  const topSrc = D.imgTop || DEFAULT_IMG_TOP;
  const botSrc = D.imgBot || DEFAULT_IMG_BOT;
  let h=`<div class="${cls}">`;

  // HERO
  h+=`<section class="hero"><div class="hero-text">
    <div class="pill fu fu1">${ef(D.name,"name",{ph:"Your name"})}</div>
    <div class="fu fu2"><h1 class="h1">${ef(D.headline,"headline",{ph:"Your headline"})}</h1>
    <p class="sub">${ef(D.subtitle,"subtitle",{ph:"Your subtitle"})}</p></div>
    <div class="bio fu fu3">`;
  D.bio.forEach((p,i) => {
    h+=`<div class="bp"><p>${ef(p,"bio."+i,{ml:true,ph:"Bio paragraph"})}</p>`;
    if(E&&D.bio.length>1) h+=`<button class="rp" onclick="rmBio(${i})">\u2715</button>`;
    h+=`</div>`;
  });
  if(E) h+=`<button class="btn-addp" onclick="addBio()">+ Add paragraph</button>`;
  h+=`</div><div class="acts fu fu4">
    <a href="#work" class="btn-p">Explore my work</a>
    <a href="#about" class="btn-g">About</a>
    <a href="#contact" class="btn-g">Contact</a>
  </div>`;

  // Hero image pair — side by side below buttons
  h+=`<div class="hero-imgs fu fu5">
    ${heroImgSlot("imgL1","fileL1","Research image 1")}
    ${heroImgSlot("imgL2","fileL2","Research image 2")}
  </div>`;

  h+=`</div>`; // end hero-text

  // SIDEBAR
  h+=`<aside class="sidebar fu fu2">
    <div class="portrait">
      <div class="portrait-stack">
        <div class="img-wrap">
          <img src="${topSrc}" alt="In the optics lab" class="img-top" style="height:260px">`;
  if(E) h+=`<div class="img-ov" onclick="document.getElementById('fileTop').click()">
    <span style="font-size:0.85rem;font-weight:500">Replace top image</span>
    ${D.imgTop?'<button onclick="event.stopPropagation();rmImg(\'imgTop\')" style="background:none;border:none;color:#ff9999;cursor:pointer;font-size:0.72rem;text-decoration:underline">Remove (restore default)</button>':''}
  </div>`;
  h+=`</div>
        <div class="img-wrap">
          <img src="${botSrc}" alt="Deriving the physics" class="img-bot" style="height:220px">`;
  if(E) h+=`<div class="img-ov" onclick="document.getElementById('fileBot').click()">
    <span style="font-size:0.85rem;font-weight:500">Replace bottom image</span>
    ${D.imgBot?'<button onclick="event.stopPropagation();rmImg(\'imgBot\')" style="background:none;border:none;color:#ff9999;cursor:pointer;font-size:0.72rem;text-decoration:underline">Remove (restore default)</button>':''}
  </div>`;
  h+=`</div>
      </div>
    </div>
    <div class="sb-body">
      <div><p class="lbl">Current focus</p><div class="sb-txt">${ef(D.currentFocus,"currentFocus",{ml:true,ph:"Your current focus"})}</div></div>
      <div class="sb-grid">
        <div class="sb-cell"><p class="lbl">Domains</p><p>${ef(D.domains,"domains",{ph:"Your domains"})}</p></div>
        <div class="sb-cell"><p class="lbl">Approach</p><p>${ef(D.approach,"approach",{ph:"Your approach"})}</p></div>
      </div>
      <div class="sb-links"><p class="lbl">Quick links</p>${lnksH(D.profileLinks,"profileLinks")}</div>
      <div class="ct-box"><p class="lbl" style="color:var(--text-3)">Contact</p>`;
  if(E) h+=`<input class="ci" data-key="email" value="${esc(D.email)}" placeholder="your@email.com">`;
  else h+=`<a href="mailto:${esc(D.email)}">${esc(D.email)||"Add your email"}</a>`;
  h+=`</div></div></aside></section>`;

  // FEATURED
  h+=`<div class="feat fu"><div class="feat-in"><div>
    <p class="sec-lbl">Featured direction</p>
    <h2 class="sec-t" style="margin-top:0.75rem">${ef(D.featured.title,"featured.title",{ph:"Featured project title"})}</h2>
    <div class="feat-sum">${ef(D.featured.summary,"featured.summary",{ml:true,ph:"Summary"})}</div>
    ${tagsH(D.featured.tags)}
  </div><div>${lnksH(D.featured.links||[],"featured.links")}</div></div></div>`;

  // ABOUT
  h+=`<section class="sec" id="about"><div class="abt-grid"><div>
    <p class="sec-lbl">About</p><h2 class="sec-t">${ef(D.aboutTitle,"aboutTitle",{ph:"About section title"})}</h2>
  </div><div class="abt-body">`;
  D.aboutBody.forEach((p,i) => {
    h+=`<div class="bp"><p>${ef(p,"aboutBody."+i,{ml:true,ph:"About paragraph"})}</p>`;
    if(E&&D.aboutBody.length>1) h+=`<button class="rp" onclick="rmAbt(${i})">\u2715</button>`;
    h+=`</div>`;
  });
  if(E) h+=`<button class="btn-addp" onclick="addAbt()">+ Add paragraph</button>`;
  h+=`</div></div></section>`;

  // PROJECTS
  h+=`<section class="sec" id="work"><div class="proj-hdr"><div>
    <p class="sec-lbl">Selected work</p>
    <h2 class="sec-t">Projects, papers, decks, and experiments in Neurotech.</h2>
  </div>`;
  if(E) h+=`<button class="btn-ap" onclick="addProj()">+ Add project</button>`;
  h+=`</div><div class="proj-grid">`;
  D.projects.forEach((it,idx) => {
    h+=`<article class="proj">`;
    if(E) h+=`<button class="rm-proj" onclick="rmProj('${it.id}')">\u2715</button>`;
    h+=`<h3>${ef(it.title,"project."+idx+".title",{ph:"Project name"})}</h3>
      <div class="desc">${ef(it.description,"project."+idx+".description",{ml:true,ph:"Describe this project"})}</div>
      ${lnksH(it.links||[],"project."+idx+".links")}
    </article>`;
  });
  h+=`</div></section>`;

  // CV + CONTACT
  h+=`<section class="sec"><div class="bot-grid">
    <div class="bot-card"><h2 style="margin-top:0">CV / Resume</h2>
      <div style="margin-top:1rem;font-size:0.85rem;line-height:1.7;color:var(--text-2)">${ef(D.cvText,"cvText",{ml:true,ph:"CV description"})}</div>
      ${lnksH(D.cvLinks||[],"cvLinks")}
    </div>
    <div class="bot-card" id="contact"><p class="sec-lbl">Contact</p><h2>Get in touch</h2>
      <p style="margin-top:1rem;font-size:0.85rem;line-height:1.7;color:var(--text-2)">For collaborations, research discussions, project opportunities, or speaking invitations.</p>
      <div style="margin-top:1.25rem;font-size:0.85rem;line-height:2;color:var(--text-2)">
        <p><strong>Email:</strong> ${E?`<input class="ei" data-key="email" value="${esc(D.email)}" style="display:inline;width:auto;margin-left:0.5rem">`:`<a href="mailto:${esc(D.email)}" style="text-decoration:underline;text-underline-offset:4px">${esc(D.email)}</a>`}</p>
        <p><strong>LinkedIn:</strong> ${E?`<input class="ei" data-key="linkedin" value="${esc(D.linkedin)}" placeholder="https://linkedin.com/in/..." style="display:inline;width:auto;margin-left:0.5rem">`:(D.linkedin?`<a href="${esc(D.linkedin)}" target="_blank" style="text-decoration:underline;text-underline-offset:4px">Profile \u2197</a>`:`<span style="font-style:italic;opacity:0.4">Not set</span>`)}</p>
        <p><strong>Location:</strong> ${ef(D.location,"location",{ph:"Your location"})}</p>
      </div>
    </div>
  </div></section>`;

  // CLOSING
  h+=`<section class="closing"><div class="closing-in"><div>
    <p class="sec-lbl" style="color:var(--text-3)">Closing thought</p>
    <h2 class="closing-q" style="margin-top:0.75rem">${ef(D.closingThought,"closingThought",{ml:true,ph:"A closing thought"})}</h2>
    <p style="margin-top:0.75rem;font-size:0.85rem;color:var(--text-3);font-family:'DM Sans',sans-serif;font-style:italic">— Sydney Brenner</p>
  </div><div style="display:flex;flex-wrap:wrap;gap:0.75rem">
    <a href="#work" class="btn-p">View work</a>
    <a href="mailto:${esc(D.email)}" class="btn-g">Email me</a>
  </div></div></section>`;

  h+=`</div>`;
  document.getElementById("root").innerHTML = h;
  document.getElementById("ft").textContent = "\u00a9 " + new Date().getFullYear() + " " + D.name;
  document.querySelectorAll("[data-key]").forEach(el => {
    el.addEventListener("input", e => setKey(e.target.dataset.key, e.target.value));
  });
}

function setKey(key, val) {
  const p=key.split(".");
  if(p[0]==="bio") D.bio[+p[1]]=val;
  else if(p[0]==="aboutBody") D.aboutBody[+p[1]]=val;
  else if(p[0]==="featured") D.featured[p[1]]=val;
  else if(p[0]==="project") D.projects[+p[1]][p[2]]=val;
  else D[key]=val;
  save();
}

function getRef(path) {
  const p=path.split(".");
  if(p[0]==="profileLinks") return {o:D,k:"profileLinks"};
  if(p[0]==="cvLinks") return {o:D,k:"cvLinks"};
  if(p[0]==="featured") return {o:D.featured,k:"links"};
  if(p[0]==="project") return {o:D.projects[+p[1]],k:"links"};
  return null;
}

function toggleEdit() {
  editing=!editing;
  document.getElementById("btnEdit").className=editing?"btn-ed on":"btn-ed off";
  document.getElementById("btnEdit").textContent=editing?"Done editing":"\u270f\ufe0f Edit site";
  document.getElementById("btnReset").classList.toggle("hidden",!editing);
  if(!editing) save();
  render();
}
function resetAll() {
  if(!confirm("Reset everything to defaults? This cannot be undone.")) return;
  D=JSON.parse(JSON.stringify(DEFAULTS)); localStorage.removeItem("hk-site-v3"); render();
}
function addBio() { D.bio.push(""); save(); render(); }
function rmBio(i) { D.bio.splice(i,1); save(); render(); }
function addAbt() { D.aboutBody.push(""); save(); render(); }
function rmAbt(i) { D.aboutBody.splice(i,1); save(); render(); }
function addProj() { D.projects.push({id:uid(),title:"New project",description:"Describe this project\u2026",links:[]}); save(); render(); }
function rmProj(id) { D.projects=D.projects.filter(p=>p.id!==id); save(); render(); }
function rmLnk(path,i) { const r=getRef(path); if(!r) return; r.o[r.k].splice(i,1); save(); render(); }
function showLF(btn, path) {
  const existing=btn.parentElement.querySelector(".lf"); if(existing) existing.remove();
  const f=document.createElement("div"); f.className="lf";
  f.innerHTML=`<input placeholder="Label (e.g. Paper PDF)" class="lf-label">
    <input placeholder="URL (e.g. https://drive.google.com/...)" class="lf-url" style="flex:2">
    <button class="ok" onclick="doAdd('${path}',this.parentElement)">Add</button>
    <button class="ccl" onclick="this.parentElement.remove()">Cancel</button>`;
  btn.parentElement.appendChild(f);
  f.querySelector(".lf-label").focus();
  f.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("keydown", e => { if(e.key==="Enter") { e.preventDefault(); doAdd(path,f); } });
  });
}
function doAdd(path, el) {
  const label=el.querySelector(".lf-label").value.trim(), url=el.querySelector(".lf-url").value.trim();
  if(!label||!url) return;
  const r=getRef(path); if(!r) return;
  if(!r.o[r.k]) r.o[r.k]=[];
  r.o[r.k].push({label,url}); save(); render();
}
function rmTag(i) { D.featured.tags.splice(i,1); save(); render(); }
function addTag(e, inp) { if(e.key==="Enter"&&inp.value.trim()) { D.featured.tags.push(inp.value.trim()); save(); render(); } }

// Image upload handler — works for all 4 slots
function handleImg(key, file) {
  if(!file) return;
  if(file.size>4*1024*1024) { alert("Image must be under 4 MB"); return; }
  const r=new FileReader();
  r.onload=function() { D[key]=r.result; save(); render(); };
  r.onerror=function() { alert("Failed to read file."); };
  r.readAsDataURL(file);
}
document.getElementById("fileTop").addEventListener("change", function(e) { handleImg("imgTop",e.target.files&&e.target.files[0]); this.value=""; });
document.getElementById("fileBot").addEventListener("change", function(e) { handleImg("imgBot",e.target.files&&e.target.files[0]); this.value=""; });
document.getElementById("fileL1").addEventListener("change", function(e) { handleImg("imgL1",e.target.files&&e.target.files[0]); this.value=""; });
document.getElementById("fileL2").addEventListener("change", function(e) { handleImg("imgL2",e.target.files&&e.target.files[0]); this.value=""; });

function rmImg(key) { D[key]=""; save(); render(); }

load(); render();
</script>
</body>
</html>
